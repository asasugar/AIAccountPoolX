services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: ai-account-pool-x-backend
    restart: unless-stopped
    environment:
      - AIACCOUNTPOOLX_CONFIG_PATH=/app/runtime/config.json
    ports:
      - "1455:1455"
    volumes:
      - backend-runtime:/app/runtime
      - backend-data:/app/packages/backend/data
      - backend-logs:/app/packages/backend/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:1455/api/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: ai-account-pool-x-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  backend-runtime:
  backend-data:
  backend-logs:
